# @package _global_
defaults:
  - _self_

# 硬件配置
hardware:
  accelerator: "gpu"
  devices: [0]
  precision: "bf16-mixed"
  seed: 42

# 数据配置
data:
  train_shards: ["/home/610-sty/compare/poe2clp/data/shanshui_tars/{00000..00173}.tar"]
  resolution: 512
  phrase_drop_rate: 0.3
  synonym_prob: 0.4
  batch_size: 8

# 模型配置
model:
  # ✅ 修改点：将文本编码器和底座路径统一更新为 Taiyi-SD
  text_encoder: "/home/610-sty/huggingface/Taiyi-Stable-Diffusion-1B-Chinese-v0.1/text_encoder"
  sd_path: "/home/610-sty/huggingface/Taiyi-Stable-Diffusion-1B-Chinese-v0.1"
  freeze_unet: true
  text_encoder_train_layers: [10,11]  # 仅训练最后4层

# 优化配置
optim:
  lr: 2e-5
  warmup_steps: 500
  max_steps: 10000
  grad_clip: 1.0